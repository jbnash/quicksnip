<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QuickSnip</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">Quick<em>Snip</em></div>
  <div class="toggle-wrap">
    <span class="toggle-label" id="toggleLabel">Enabled</span>
    <label class="toggle">
      <input type="checkbox" id="enabledToggle" checked />
      <span class="slider"></span>
    </label>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <input class="search" id="search" type="search" placeholder="Search snippets…" autocomplete="off" />
  <button class="btn-add" id="btnAdd">+ New</button>
</div>

<!-- Edit / Add form -->
<div class="edit-form" id="editForm">
  <div>
    <div class="field-label">Abbreviation</div>
    <input id="formAbbrev" type="text" placeholder="e.g. ddate" autocomplete="off" spellcheck="false" />
  </div>
  <div>
    <div class="field-label">Label (optional)</div>
    <input id="formLabel" type="text" placeholder="e.g. Today's date" autocomplete="off" />
  </div>
  <div>
    <div class="field-label">Expansion text</div>
    <textarea id="formText" placeholder="e.g. %B %e, %Y  →  April 8, 2026"></textarea>
  </div>
  <div class="form-actions">
    <button class="btn-cancel" id="btnCancel">Cancel</button>
    <button class="btn-save"   id="btnSave">Save</button>
  </div>
</div>

<!-- Snippet list -->
<div class="snippet-list" id="snippetList"></div>

<!-- Footer -->
<div class="footer" id="footer"></div>

<script src="popup.js"></script>
</body>
</html>
